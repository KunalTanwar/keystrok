name: CI

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Test & Typecheck
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Build core
              run: bun run build
              working-directory: packages/core

            - name: Build react
              run: bun run build
              working-directory: packages/react

            - name: Run all tests
              run: bun test

            - name: Typecheck (core)
              run: bun run typecheck
              working-directory: packages/core

            - name: Typecheck (react)
              run: bun run typecheck
              working-directory: packages/react
